<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Windy City Weapons</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>WINDY CITY WEAPONS</h1>

<p>GTA Weapon Spin</p>

</header>




<!-- CLEAR BUTTON -->

<div class="top-bar">

<button 
id="clearButton"
class="clear-button"
onclick="clearHistory()">

CLEAR HISTORY

</button>

</div>





<!-- MAIN AREA -->

<div class="main-container">





<!-- LEFT PANEL -->

<div class="left-panel">


<h2>RANDOMIZE</h2>


<button 
class="randomize-button"
onclick="openRandomizer()">

RANDOMIZE

</button>





<div id="tierMenu" class="tier-menu">


<h3>SELECT TIER</h3>



<button onclick="selectTier('tier0')">

Tier 0

</button>




<button onclick="selectTier('tier1')">

Tier 1

</button>




<button onclick="selectTier('tier15')">

Tier 1.5

</button>




<button onclick="selectTier('tier2')">

Tier 2

</button>



</div>







<button

id="galleryButton"

class="gallery-button"

onclick="openGallery()">

VIEW WEAPONS

</button>




</div>









<!-- CENTER PANEL -->


<div class="center-panel">



<h2>WEAPON SPIN</h2>






<div class="spin-box">



<img



src="images/pistol.jpeg"

alt="300">





<h1 id="weaponName">

READY

</h1>




</div>







<button

id="spinButton"

class="spin-button"

onclick="startSpin()">

SPIN

</button>







<div class="spin-arrow">

⬇

</div>







<div id="weaponStats">


Select a tier and spin.

</div>









<div class="spin-history">



<h2>

SPIN HISTORY

</h2>





<div id="spinHistory">


No weapons spun yet.


</div>




</div>






</div>









<!-- RIGHT PANEL -->


<div class="right-panel">



<h2>

CURRENT POOL

</h2>





<div id="currentPool">


Select a tier.


</div>





</div>









</div>









<!-- GALLERY SCREEN -->


<div

id="galleryScreen"

class="gallery-screen hidden">






<h1>

WEAPON GALLERY

</h1>







<div id="weaponGallery">


</div>







<button

class="back-button"

onclick="closeGallery()">

BACK

</button>







</div>







<script src="script.js"></script>



</body>


</html>
