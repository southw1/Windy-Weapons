<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Windy City Weapons</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

    <h1>WINDY CITY WEAPONS</h1>

    <p>GTA Weapon Randomizer</p>

</header>





<div class="container">



    <!-- LEFT SIDE -->

    <div class="tier-panel">


        <h2>WEAPON TIERS</h2>


        <button onclick="showTier('tier0')">
            Tier 0
        </button>


        <button onclick="showTier('tier1')">
            Tier 1
        </button>


        <button onclick="showTier('tier15')">
            Tier 1.5
        </button>


        <button onclick="showTier('tier2')">
            Tier 2
        </button>




        <h2>WEAPON POOL</h2>


        <ul id="weaponList">

        </ul>


    </div>







    <!-- CENTER SPINNER -->


    <div class="spinner-panel">


        <h2>WEAPON SPIN</h2>



        <div class="spinner-box">


            <img

            id="weaponImage"

            src=""

            alt="GTA Weapon">


            <h1 id="weaponName">

                READY

            </h1>


        </div>





        <button

        class="spin-button"

        onclick="randomizeWeapon()">

            Spinn

        </button>





        <div id="weaponStats">

            Choose a tier and spin.

        </div>



    </div>







    <!-- RIGHT SIDE -->


    <div class="info-panel">


        <h2>CURRENT POOL</h2>


        <div id="currentPool">

            Select a tier.

        </div>





        <h2>ABOUT</h2>


        <p>

            Windy City Weapons is a GTA-style
            weapon randomizer.

            <br><br>

            Select a tier and spin to receive
            a random GTA weapon.

        </p>



    </div>





</div>







<footer>


    <h3>

        WINDY CITY WEAPONS

    </h3>


    <p>

        GTA Weapon Spin

    </p>


</footer>






<script src="script.js"></script>


</body>

</html>
