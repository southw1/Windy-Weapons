<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Windy City Weapons</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>WINDY CITY WEAPONS</h1>

<p>GTA Weapon Spin</p>

</header>



<!-- CLEAR BUTTON -->

<div class="top-bar">

<button 
class="clear-button"
onclick="clearHistory()">

CLEAR HISTORY

</button>

</div>





<!-- MAIN 3 COLUMN AREA -->

<div class="main-container">





<!-- LEFT PANEL -->

<div class="left-panel">


<h2>RANDOMIZE</h2>


<button 
class="randomize-button"
onclick="openRandomizer()">

RANDOMIZE

</button>




<div id="tierMenu" class="tier-menu">


<h3>SELECT TIER</h3>


<button onclick="selectTier('tier0')">

Tier 0

</button>



<button onclick="selectTier('tier1')">

Tier 1

</button>



<button onclick="selectTier('tier1.5')">

Tier 1.5

</button>



<button onclick="selectTier('tier2')">

Tier 2

</button>


</div>





<button

class="gallery-button"

onclick="openGallery()">

VIEW WEAPONS

</button>



</div>
